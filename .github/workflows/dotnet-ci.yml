name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/OpsBoard.Client/package-lock.json

      - name: Restore
        run: dotnet restore OpsBoard.slnx --configfile .github/nuget.ci.config

      - name: Build
        run: dotnet build OpsBoard.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OpsBoard.slnx --configuration Release --no-build --verbosity normal

      - name: Install client dependencies
        working-directory: src/OpsBoard.Client
        run: npm ci

      - name: Lint client
        working-directory: src/OpsBoard.Client
        run: npm run lint

      - name: Test client
        working-directory: src/OpsBoard.Client
        run: npm test

      - name: Build client
        working-directory: src/OpsBoard.Client
        run: npm run build
